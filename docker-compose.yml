# =============================================================
# 好室行旅 出入帳系統 — docker-compose
#
# 架構說明：資料庫 / 登入 / 即時同步全部由 Supabase Cloud 託管，
# 因此這裡「只需要」跑 Next.js 前後端這一個服務，不需要自架 Postgres。
# （Supabase 連線資訊放在同層的 .env，見 .env.local.example）
#
# 啟動： docker compose up -d --build
# 查看： docker compose logs -f web
# 停止： docker compose down
# =============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 需在 build 階段就注入（會內嵌進前端 bundle）
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
