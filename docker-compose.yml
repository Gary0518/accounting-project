# =============================================================
# 好室行旅 出入帳系統 — docker-compose
#
# 架構說明：資料庫 / 登入 / 即時同步全部由 Supabase Cloud 託管，
# 因此這裡「只需要」跑 Next.js 前後端這一個服務，不需要自架 Postgres。
# （Supabase 連線資訊放在同層的 .env，見 .env.local.example）
#
# 啟動： docker compose up -d --build
# 查看： docker compose logs -f web
# 停止： docker compose down
# =============================================================

# 明確指定專案名稱：若不指定，Compose 會拿資料夾名稱當專案名，
# 非 ASCII 的資料夾名會被過濾成空字串並報錯 project name must not be empty
name: accounting

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 需在 build 階段就注入（會內嵌進前端 bundle）
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      # 用 127.0.0.1 而非 localhost：容器內 localhost 會解析成 IPv6 [::1]，
      # 但 Next.js 綁在 IPv4 0.0.0.0，走 IPv6 會 connection refused
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
